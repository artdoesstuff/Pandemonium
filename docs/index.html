<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandemonium — Audio Visualiser</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <meta name="description" content="Pandemonium — a browser-based audio visualiser. Load a track, add images, and watch as your music comes alive." />
  <meta property="og:title" content="Pandemonium — Audio Visualiser" />
  <meta property="og:description" content="Load a track, add images, and watch as your music comes alive." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://artdoesstuff.github.io/Pandemonium/assets/splash.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pandemonium — Audio Visualiser" />
  <meta name="twitter:description" content="Load a track, add images, and watch as your music comes alive." />
  <meta name="twitter:image" content="https://artdoesstuff.github.io/Pandemonium/assets/splash.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>

  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

<div id="app">

  <header id="header">
    <span class="logo">Pandemonium</span>
    <div class="sep"></div>

    <label class="upload-btn" title="Upload audio file">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      Load Audio
      <input type="file" id="audio-upload" accept="audio/*" />
    </label>

    <label class="upload-btn" title="Upload images to workspace">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Add Images
      <input type="file" id="image-upload" accept="image/*" multiple />
    </label>

    <div class="sep"></div>

    <span id="track-name">— no track loaded —</span>

    <div class="sep"></div>

    <div id="playback-controls">
      <button class="ctrl-btn" id="btn-restart" title="Restart [R]">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.87"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-play" title="Play / Pause [Space]">
        <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
    </div>

    <div class="sep"></div>

    <div id="vol-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8" />
    </div>

    <span id="focus-hint">
      <kbd>Space</kbd> play &nbsp;
      <kbd>R</kbd> restart &nbsp;
      <kbd>F</kbd> focus
    </span>
  </header>

  <div id="workspace">
    <div class="corner tl"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>
    <div class="corner tr"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>
    <div class="corner bl"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>
    <div class="corner br"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>

    <div id="idle-msg">
      <h2>Pandemonium</h2>
      <p>Load an audio file to begin<br/>Add images · Drag &amp; resize · Press <strong>F</strong> to focus</p>
    </div>

    <canvas id="visualizer"></canvas>
  </div>

</div>

<audio id="audio-player" preload="auto"></audio>

<script src="scripts/script.js"></script>

</body>
</html>
