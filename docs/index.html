<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandemonium — Audio Visualiser</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <meta name="description" content="Pandemonium — a browser-based audio visualiser. Load a track, add images, and watch your music come alive." />
  <meta property="og:title" content="Pandemonium — Audio Visualiser" />
  <meta property="og:description" content="Load a track, add images, and watch your music come alive." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://artdoesstuff.github.io/Pandemonium/assets/splash.png" />
  <meta property="og:image:width" content="741" />
  <meta property="og:image:height" content="451" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pandemonium — Audio Visualiser" />
  <meta name="twitter:description" content="Load a track, add images, and watch your music come alive." />
  <meta name="twitter:image" content="https://artdoesstuff.github.io/Pandemonium/assets/splash.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Share+Tech+Mono&family=Inter:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Dancing+Script:wght@400;700&family=Oswald:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Abril+Fatface&family=Righteous&family=Permanent+Marker&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

<div id="app">

  <header id="header">
    <span class="logo">Pandemonium</span>
    <div class="sep"></div>

    <label class="upload-btn" title="Upload audio file">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
      </svg>
      Load Audio
      <input type="file" id="audio-upload" accept="audio/*" />
    </label>

    <label class="upload-btn" title="Upload images to workspace">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Add Images
      <input type="file" id="image-upload" accept="image/*" multiple />
    </label>

    <button class="upload-btn" id="btn-add-text" title="Add text overlay">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
      </svg>
      Add Text
    </button>

    <div class="sep"></div>

    <span id="track-name">— no track loaded —</span>

    <div class="sep"></div>

    <div id="playback-controls">
      <button class="ctrl-btn" id="btn-restart" title="Restart [R]">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.87"/>
        </svg>
      </button>
      <button class="ctrl-btn disabled" id="btn-prev" title="Previous track">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-play" title="Play / Pause [Space]">
        <svg id="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg id="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn disabled" id="btn-next" title="Next track">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-loop" title="Toggle Loop [L]">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-shuffle" title="Toggle Shuffle [E]">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><line x1="21" y1="20" x2="4" y2="3"/><polyline points="21 16 21 21 16 21"/>
        </svg>
      </button>
    </div>

    <div class="sep"></div>

    <div id="vol-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8" />
    </div>

    <div id="spd-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <select id="spd-select">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>

    <button class="upload-btn" id="btn-queue" title="Toggle queue panel">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Queue
    </button>

    <div id="colour-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
      <label for="accent-picker" title="Change accent colour">Colour</label>
      <input type="color" id="accent-picker" value="#f472b6" />
    </div>
    <!--  
    <span id="focus-hint">
      <kbd>Space</kbd> play &nbsp;
      <kbd>R</kbd> restart &nbsp;
      <kbd>L</kbd> loop &nbsp;
      <kbd>Q</kbd> queue &nbsp;
      <kbd>←/→</kbd> seek &nbsp;
      <kbd>↑/↓</kbd> volume &nbsp;
      <kbd>E</kbd> shuffle &nbsp;
      <kbd>F</kbd> focus
    </span>
    -->
  </header>

  <div id="workspace">
    <div class="corner tl"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>
    <div class="corner tr"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>
    <div class="corner bl"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>
    <div class="corner br"><svg viewBox="0 0 40 40" fill="none" stroke="#c084fc" stroke-width="1">
      <path d="M2 38 L2 2 L38 2"/><path d="M2 20 L10 12 M2 28 L18 10"/>
    </svg></div>

    <div id="idle-msg">
      <h2>Pandemonium</h2>
      <p>Load an audio file to begin<br/>Add images · Drag &amp; resize · Press <strong>F</strong> to focus</p>
    </div>

    <canvas id="visualizer"></canvas>

    <div id="item-toolbar">
      <div id="tb-img-controls">
        <button class="tb-btn" id="tb-flip-h" title="Flip Horizontal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v18M4 7l-3 5 3 5M20 7l3 5-3 5"/>
          </svg>
        </button>
        <button class="tb-btn" id="tb-flip-v" title="Flip Vertical">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M7 4l5-3 5 3M7 20l5 3 5-3"/>
          </svg>
        </button>
        <div class="tb-sep"></div>
      </div>

      <div id="tb-text-controls">
        <select id="tb-font" title="Font">
          <option value="Share Tech Mono">Share Tech Mono</option>
          <option value="Inter">Inter</option>
          <option value="Playfair Display">Playfair Display</option>
          <option value="Space Mono">Space Mono</option>
          <option value="Bebas Neue">Bebas Neue</option>
          <option value="Dancing Script">Dancing Script</option>
          <option value="Oswald">Oswald</option>
          <option value="Lora">Lora</option>
          <option value="Abril Fatface">Abril Fatface</option>
          <option value="Righteous">Righteous</option>
          <option value="Permanent Marker">Permanent Marker</option>
          <option value="Cinzel Decorative">Cinzel Decorative</option>
        </select>
        <input type="number" id="tb-fontsize" value="32" min="8" max="172" title="Font size" />
        <button class="tb-btn tb-toggle" id="tb-bold" title="Bold">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
          </svg>
        </button>
        <button class="tb-btn tb-toggle" id="tb-italic" title="Italic">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/>
          </svg>
        </button>
        <input type="color" id="tb-text-color" value="#ffffff" title="Text colour" class="tb-color" />
        <div class="tb-sep"></div>
      </div>

      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted);flex-shrink:0;opacity:0.5">
        <rect x="2" y="8" width="4" height="13"/><rect x="10" y="2" width="4" height="19"/><rect x="18" y="5" width="4" height="16"/>
      </svg>
      <input type="range" id="tb-opacity" min="0.05" max="1" step="0.01" value="1" title="Opacity" />
      <div class="tb-sep"></div>
      <button class="tb-btn tb-delete" id="tb-delete" title="Delete [Del]">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>

    <div id="queue-panel">
      <div id="queue-header">
        <span>Queue</span>
        <label class="queue-add-btn" title="Add tracks to queue">
          + Add
          <input type="file" id="audio-upload-queue" accept="audio/*" multiple />
        </label>
      </div>
      <ul id="queue-list"></ul>
    </div>

    <div id="drop-overlay">
      <div id="drop-msg">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <span>Drop audio file to load</span>
      </div>
    </div>
  </div>

</div>

<audio id="audio-player" preload="auto"></audio>
<script src="scripts/db.js"></script>
<script src="scripts/state.js"></script>
<script src="scripts/audio.js"></script>
<script src="scripts/visualizer.js"></script>
<script src="scripts/workspace.js"></script>
<script src="scripts/main.js"></script>

</body>
</html>
